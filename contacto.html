<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contacto - Dra Gomez Lorena</title>
    <link rel="icon" type="image/png" href="favicon.png" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="css/app.css" />
</head>

<body>
    <header>
        <nav class="navbar navbar-expand-lg px-3 fixed-top shadow-sm">
            <div class="container-fluid px-0">
                <a class="navbar-brand ps-0" href="index.html">
                    <img src="iconos/GomezIconDorado.png" alt="Logo" style="height: 100px;" />
                </a>
                <button class="navbar-toggler border-warning" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarNav">
                    <ul class="navbar-nav ms-auto">
                        <li class="nav-item"><a class="nav-link" href="index.html">Inicio</a></li>
                        <li class="nav-item"><a class="nav-link" href="servicios.html">Servicios</a></li>
                        <li class="nav-item"><a class="nav-link" href="consultorios.html">Consultorios</a></li>
                        <li class="nav-item"><a class="nav-link" href="redes.html">Redes</a></li>
                        <li class="nav-item"><a class="nav-link active" href="contacto.html">Contacto</a></li>
                        <li class="nav-item"><a class="nav-link" href="carrito.html">Carrito</a></li>
                    </ul>
                </div>
            </div>
        </nav>
    </header>

    <main class="contenido-principal container">
        <div class="row justify-content-center">
            <div class="col-lg-8 text-center mb-5">
                <h1 class="display-4 text-primary fw-bold"><i class="bi bi-envelope-at-fill me-2"></i> Contactanos</h1>
                <p class="lead text-muted">Estamos aquí para responder tus dudas y coordinar tu atención.</p>
            </div>
            <div class="col-md-10 col-lg-8">
                <div class="card shadow-sm p-4 p-md-5">
                    <form action="https://formsubmit.co/miguezexequiel@hotmail.com" method="POST">
                        <input type="hidden" name="_captcha" value="false" />
                        <input type="hidden" name="_next" value="gracias.html" />

                        <div class="row g-4">
                            <div class="col-md-6">
                                <label for="nombre" class="form-label fw-bold">
                                    <i class="bi bi-person-fill text-primary me-2"></i>Nombre Completo
                                </label>
                                <input type="text" name="Nombre" id="nombre" class="form-control form-control-lg" placeholder="Tu nombre" required />
                            </div>

                            <div class="col-md-6">
                                <label for="email" class="form-label fw-bold">
                                    <i class="bi bi-envelope-fill text-primary me-2"></i>Correo Electrónico
                                </label>
                                <input type="email" name="Email" id="email" class="form-control form-control-lg" placeholder="tu@email.com" required />
                            </div>

                            <div class="col-12">
                                <label for="mensaje" class="form-label fw-bold">
                                    <i class="bi bi-chat-left-text-fill text-primary me-2"></i>Mensaje o Consulta
                                </label>
                                <textarea name="Mensaje" id="mensaje" rows="6" class="form-control" placeholder="Escribe aquí tu consulta..." required></textarea>
                            </div>

                            <div class="col-12 d-grid mt-4">
                                <button type="submit" class="btn btn-primary btn-lg py-3 fw-bold">
                                    <i class="bi bi-send-fill me-2"></i>Enviar Mensaje
                                </button>
                            </div>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </main>

    <footer class="bg-primary text-white py-4 mt-auto">
        <div class="container text-center">
            <p class="mb-0">&copy; 2026 Dra. Gomez Lorena</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
